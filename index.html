<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Transparency | Interaction of Color
    </title>


    <!-- Main stylesheet -->

    <link rel="stylesheet" href="styles/style.css">


</head>



<body>



    <!-- ==========================================
         HEADER
    =========================================== -->


    <header>


        <h1>
            TRANSPARENCY
        </h1>


        <p class="subtitle">

            Exploration of Interaction, Perception, and Overlapping Color

        </p>


    </header>







    <!-- ==========================================
         MAIN COLOR STUDY
    =========================================== -->


    <main>



        <section class="main-canvas-section">


            <div class="canvas-wrapper">


                <canvas id="colorCanvas"></canvas>



                <!--
                    Hover label:
                    Displays original circle color
                    when user places cursor over circle
                -->


                <div id="sourceLabelContainer"></div>




                <!--
                    Discovery label:
                    Appears when new colors are created
                    through overlapping circles
                -->


                <div id="discoveredLabelContainer"></div>



            </div>


        </section>









        <!-- ======================================
             INSTRUCTIONS
        ======================================= -->


        <section class="instructions">


            <p>

                Press <strong>SPACEBAR</strong> to pause or resume
                the movement.
                Hover over circles to explore original colors.

            </p>


        </section>









        <!-- ======================================
             DISCOVERED COLOR ARCHIVE
        ======================================= -->


        <section class="color-archive">


            <h2>

                Discovered Colors

            </h2>



            <div id="colorArchiveContainer">


                <!--

                    Generated by JavaScript

                    Example:

                    Lavender
                    RGB 221,194,233

                -->


            </div>



        </section>









        <!-- ======================================
             FUTURE EXERCISE TABS
        ======================================= -->


     <div class="exercise-tabs">


    <div class="exercise-tab">

        <h3>Exercise 01</h3>

        <div id="canvas-container-1"></div>

    </div>


    <div class="exercise-tab">

        <h3>Exercise 02</h3>

        <div id="canvas-container-2"></div>

    </div>


    <div class="exercise-tab">

        <h3>Exercise 03</h3>

        <div id="canvas-container-3"></div>

    </div>

    <div class="exercise-tab">

        <h3>Exercise 04</h3>

        <div id="canvas-container-4"></div>

    </div>


</div>








        <!-- ======================================
             FUTURE ASSIGNMENT CANVASES
        ======================================= -->


       <section class="exercise-navigation">


    <div class="exercise-buttons">

        <button class="exercise-button active" data-canvas="1">
            Exercise 01
        </button>

        <button class="exercise-button" data-canvas="2">
            Exercise 02
        </button>

        <button class="exercise-button" data-canvas="3">
            Exercise 03
        </button>

        <button class="exercise-button" data-canvas="4">
            Exercise 04
        </button>

        <button class="exercise-button" data-canvas="5">
            Exercise 05
        </button>

        <button class="exercise-button" data-canvas="6">
            Exercise 06
        </button>

    </div>



    <div class="exercise-panels">


        <div id="exercise1" class="exercise-panel active">

            <div id="canvas-container-1"></div>

        </div>


        <div id="exercise2" class="exercise-panel">

            <div id="canvas-container-2"></div>

        </div>


        <div id="exercise3" class="exercise-panel">

            <div id="canvas-container-3"></div>

        </div>


    </div>


</section>





    </main>









    <!-- ==========================================
         FOOTER
    =========================================== -->


    <footer>


        <p>

            Inspired by Josef Albers' book
            <em>Interaction of Color</em>

        </p>


    </footer>








    <!-- JavaScript -->


    <script src="javascript/main.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>


<script src="javascript/main.js"></script>

<script src="javascript/exercises/exercise01.js"></script>
<script src="javascript/exercises/exercise02.js"></script>
<script src="javascript/exercises/exercise03.js"></script>
<script src="javascript/exercises/exercise04.js"></script>



</body>


</html>
